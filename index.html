<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payment Gateway — Sign In</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js"></script>
  <style>
    :root{--bg:#0a0e1a;--card:#111827;--card2:#1a2236;--border:#1e293b;--text:#f1f5f9;--muted:#64748b;--accent:#22d3ee;--accent2:#f97316;--red:#ef4444;--purple:#a78bfa;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;background-image:radial-gradient(ellipse 70% 50% at 30% 20%,rgba(34,211,238,.07),transparent),radial-gradient(ellipse 50% 40% at 80% 80%,rgba(249,115,22,.06),transparent);}
    .wrap{width:100%;max-width:400px;}
    .brand{text-align:center;margin-bottom:28px;}
    .icon{width:56px;height:56px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;display:inline-flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#fff;margin-bottom:12px;}
    .brand h1{font-size:1.5rem;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--purple),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .brand p{color:var(--muted);font-size:.82rem;margin-top:4px;}
    .card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:32px;}
    .card h2{font-size:1.1rem;font-weight:700;margin-bottom:22px;}
    .field{margin-bottom:16px;}
    .field label{display:block;font-size:.75rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
    .field input{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:.9rem;outline:none;transition:border-color .2s;font-family:inherit;}
    .field input:focus{border-color:var(--accent);}
    .field input::placeholder{color:var(--muted);}
    .err{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);border-radius:10px;padding:10px 14px;font-size:.85rem;color:var(--red);margin-bottom:14px;display:none;line-height:1.5;}
    .btn{width:100%;padding:13px;background:linear-gradient(135deg,#0891b2,#22d3ee);border:none;border-radius:12px;color:#fff;font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(34,211,238,.3);transition:box-shadow .2s,transform .15s;font-family:inherit;margin-top:6px;}
    .btn:hover{box-shadow:0 6px 28px rgba(34,211,238,.5);}
    .btn:active{transform:scale(.98);}
    .btn:disabled{opacity:.6;cursor:not-allowed;}
  </style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="icon">P</div>
    <h1>Payment Gateway</h1>
    <p>Sign in to your account</p>
  </div>
  <div class="card">
    <h2>Welcome back</h2>
    <div class="err" id="err"></div>
    <form id="form">
      <div class="field"><label>Email</label><input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/></div>
      <div class="field"><label>Password</label><input type="password" id="pw" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;" required autocomplete="current-password"/></div>
      <button class="btn" id="btn" type="submit">Sign In</button>
    </form>
  </div>
</div>
<script>
  const errEl = document.getElementById('err');
  const btn   = document.getElementById('btn');
  let formLoginActive = false;

  auth.onAuthStateChanged(async user => {
    if (!user || formLoginActive) return;
    try {
      const snap = await db.collection('users').doc(user.uid).get();
      if (!snap.exists || snap.data().active === false) { await auth.signOut(); return; }
      window.location.href = snap.data().role === 'admin' ? 'admin.html' : 'deposit.html';
    } catch(e) {}
  });

  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    errEl.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Signing in…';
    formLoginActive = true;
    const email = document.getElementById('email').value.trim();
    const pw    = document.getElementById('pw').value;
    try {
      const cred = await auth.signInWithEmailAndPassword(email, pw);
      const snap = await db.collection('users').doc(cred.user.uid).get();
      if (!snap.exists) { await auth.signOut(); throw new Error('Account not configured. Contact your administrator.'); }
      if (snap.data().active === false) { await auth.signOut(); throw new Error('Your account has been deactivated.'); }
      window.location.href = snap.data().role === 'admin' ? 'admin.html' : 'deposit.html';
    } catch(err) {
      formLoginActive = false;
      btn.disabled = false; btn.textContent = 'Sign In';
      errEl.textContent = friendlyErr(err.message);
      errEl.style.display = 'block';
    }
  });

  function friendlyErr(m) {
    if (m.includes('user-not-found') || m.includes('wrong-password') || m.includes('invalid-credential') || m.includes('INVALID_LOGIN_CREDENTIALS')) return 'Invalid email or password.';
    if (m.includes('too-many-requests')) return 'Too many failed attempts. Try again later.';
    return m;
  }
</script>
</body>
</html>
